name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # --- WASM 빌드 ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Build WASM
        run: wasm-pack build --target web --release

      # --- rhwp-studio 빌드 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: rhwp-studio
        run: npm install

      - name: Copy WASM to public
        run: |
          cp pkg/rhwp_bg.wasm rhwp-studio/public/
          cp pkg/rhwp.js rhwp-studio/public/

      - name: Copy favicon
        run: cp assets/logo/favicon.ico rhwp-studio/public/favicon.ico

      - name: Build rhwp-studio
        working-directory: rhwp-studio
        run: npx vite build --base=/rhwp/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rhwp-studio/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
